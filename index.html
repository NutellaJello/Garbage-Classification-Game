<!DOCTYPE html>
<html>
<head>
  <title>Garbage Classification Game</title>
  <link rel = "stylesheet" href ="style.css">
  <!--link connects HTML to CSS-->
  <!--rel stands for relationship. it can be a stylesheet (adjusts colors and size,etc), icon (small icon shown in browser), preconnect, preload, etc-->
  <!--href is the file you use-->
</head>
<body>
  <h1>Garbage Classification</h1>
  <p id = 'score'>Score: </p>
  <!--id is an unique ID css can specifically connect to the thing in html-->

  <div class = "game-box">
    <!--div is used to group things together-->
    <!-- class is similar to HTML but will be applied to everything-->
    
    <img id = "garbage-img" src ='' alt = "garbage image">
    <!--img displays and image. src is the file path, alt is backup if image doesnt load-->

    <div class = "buttons">
       <!-- everything here is in the buttons class. CSS tells all buttons to become white-->
      <!-- onclick connects HTML to js function-->
      <button onclick = "checkAnswer('Cardboard')"> Cardboard </button>
      <button onclick = "checkAnswer('Miscellaneous')"> Miscellaneous </button>
      <button onclick = "checkAnswer('Organic')"> Organic </button>
      <button onclick = "checkAnswer('Paper')"> Paper </button>
      <button onclick = "checkAnswer('Glass')"> Glass </button>
      <button onclick = "checkAnswer('Metal')"> Metal </button>
      <button onclick = "checkAnswer('Plastic')"> Plastic </button>
    </div>
    
    <p id = "testing"> </p>
  </div>
  <script src = "script.js"></script>
  <!--script links HTML to JS-->
  
</body>
</html>
